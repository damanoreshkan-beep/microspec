# Bare feed-proxy in Docker — no VPN, just the Node proxy. restart:unless-stopped makes it survive ssh
# disconnect AND reboot with zero babysitting (the Docker daemon owns its lifecycle). nginx on the host
# reverse-proxies https://jobs-map.mooo.com/feed → 127.0.0.1:8787 → this container.
services:
  proxy:
    container_name: feed-proxy
    image: node:20-alpine
    volumes:
      - /home/mrx/feed-proxy:/app
    working_dir: /app
    command: sh -c "set -a; . ./.env; PORT=8787 HOST=0.0.0.0 exec node feed-proxy.mjs"
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped

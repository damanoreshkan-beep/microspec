name: verify

# The gate. Runtime is off-device — CI is the only place Chromium runs (visual gates need ~1GB RAM).
# unit: browser-free logic + schema contract. verify: one Chromium job per app (axe + responsive + e2e).

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    # Fail fast on a hung/broken run (incl. a GitHub action-download outage stuck in "Set up job"):
    # cap the whole job so it can't burn runner minutes retrying. Real work here is well under a minute.
    timeout-minutes: 4
    outputs:
      apps: ${{ steps.discover.outputs.apps }}
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - name: Runtime unit tests (pure logic, no browser)
        run: deno test -A packages/runtime/runtime_test.js
      - name: Schema contract gate (ajv) over every app spec
        run: deno run -A packages/schema/validate.mjs apps/*/spec.json
      - name: Build check (dist assembles)
        run: deno run -A deploy/build.mjs
      - name: Discover apps (spec + e2e present)
        id: discover
        run: |
          APPS=$(for d in apps/*/; do [ -f "${d}spec.json" ] && [ -f "${d}e2e.spec.mjs" ] && basename "$d"; done | jq -R . | jq -cs .)
          echo "apps → $APPS"
          echo "apps=$APPS" >> "$GITHUB_OUTPUT"

  verify:
    runs-on: ubuntu-latest
    needs: unit
    # Cap the whole job: normal run is ~2min (chrome+xvfb setup + ~5s gate); this kills a stuck setup
    # (e.g. GitHub action-download outage) or a hung browser instead of letting it drag ~4min and waste
    # runner minutes across the whole matrix.
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.unit.outputs.apps) }}
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with: { deno-version: v2.x }
      - name: Cache deno deps
        uses: actions/cache@v6
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('packages/**/deno.json') }}
          restore-keys: deno-
      - uses: browser-actions/setup-chrome@v2
        id: chrome
        with: { chrome-version: stable }
      - run: sudo apt-get update && sudo apt-get install -y xvfb fonts-liberation
      - name: Verify ${{ matrix.app }}
        # The gate itself is ~5s; 2min is a generous ceiling that fails fast if the browser or a
        # network-dependent e2e step hangs, rather than waiting out the job-level timeout.
        timeout-minutes: 2
        env:
          DISPLAY: ":99"
          DISPLAY_NUM: "99"
          CHROMIUM_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: deno run -A packages/gates/verify.mjs "$GITHUB_WORKSPACE/apps/${{ matrix.app }}" --shots
      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shot-${{ matrix.app }}
          path: apps/${{ matrix.app }}/states/main.png
          if-no-files-found: warn

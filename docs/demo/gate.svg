<svg xmlns="http://www.w3.org/2000/svg" width="760" height="424" viewBox="0 0 760 424" role="img" aria-label="microspec gate demo: preflight catches a missing translation, then passes after the fix">
  <rect width="760" height="424" rx="10" fill="#0d1117"/>
  <rect width="760" height="36" rx="10" fill="#161b22"/><rect y="26" width="760" height="10" fill="#161b22"/>
  <circle cx="20" cy="18" r="6" fill="#f85149"/><circle cx="40" cy="18" r="6" fill="#e3b341"/><circle cx="60" cy="18" r="6" fill="#3fb950"/>
  <text x="380" y="22" text-anchor="middle" font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#8b949e">microspec — the gate blocks a broken app</text>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.0250;0.0400;1" values="0;0;1;1"/><text x="24" y="52" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#58a6ff">$</tspan> pf apps/hf</text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.0917;0.1067;1" values="0;0;1;1"/><text x="24" y="74" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#3fb950">✓ hf</tspan></text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.1250;0.1400;1" values="0;0;1;1"/><text x="24" y="96" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#8b949e">✓ all clean</tspan></text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.2000;0.2150;1" values="0;0;1;1"/><text x="24" y="140" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#8b949e"># agent ships a feature — and forgets one translation…</tspan></text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.2500;0.2650;1" values="0;0;1;1"/><text x="24" y="162" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#58a6ff">$</tspan> deno run -A docs/demo/break.mjs</text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.3167;0.3317;1" values="0;0;1;1"/><text x="24" y="184" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve">agent change applied — dropped i18n key "tabSaved"</text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.3833;0.3983;1" values="0;0;1;1"/><text x="24" y="228" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#58a6ff">$</tspan> pf apps/hf</text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.4500;0.4650;1" values="0;0;1;1"/><text x="24" y="250" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">✗ hf</tspan></text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.4917;0.5067;1" values="0;0;1;1"/><text x="24" y="272" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">      i18n key "tabSaved" missing in uk.json</tspan></text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.5417;0.5567;1" values="0;0;1;1"/><text x="24" y="294" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#f85149">✗ 1 app(s) failed</tspan></text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.6333;0.6483;1" values="0;0;1;1"/><text x="24" y="338" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#8b949e"># fixed. green. only green merges.</tspan></text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.6833;0.6983;1" values="0;0;1;1"/><text x="24" y="360" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#58a6ff">$</tspan> git checkout apps/hf/i18n/uk.json &amp;&amp; pf apps/hf</text></g>
  <g opacity="0"><animate attributeName="opacity" dur="12s" repeatCount="indefinite" keyTimes="0;0.7667;0.7817;1" values="0;0;1;1"/><text x="24" y="382" font-family="ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace" font-size="14" fill="#c9d1d9" xml:space="preserve"><tspan fill="#3fb950">✓ hf</tspan>   <tspan fill="#8b949e">✓ all clean</tspan></text></g>
</svg>

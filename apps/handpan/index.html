<!DOCTYPE html>
<html lang="uk" data-theme="signal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0A0B">
  <title>Хендпан</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>body{font-family:'Geist',ui-sans-serif,system-ui,sans-serif}</style>
  <style>
    html,body{background:var(--color-base-200,#141416)}
    #boot{position:fixed;inset:0;z-index:60;background:var(--color-base-200,#141416);opacity:1;transition:opacity .4s ease;pointer-events:none}
    #boot.gone{opacity:0}
    #boot .bh{height:3.5rem;padding-top:env(safe-area-inset-top);display:flex;align-items:center;padding-left:1rem;background:color-mix(in oklch,var(--color-base-100,#0a0a0b) 80%,transparent);border-bottom:1px solid color-mix(in oklch,var(--color-base-content,#ececee) 10%,transparent)}
    #boot .bm{font-family:var(--font-mono,ui-monospace,monospace);text-transform:uppercase;letter-spacing:.05em;font-weight:700;font-size:1.02rem;color:var(--color-base-content,#ececee);opacity:.85}
    #boot .bb{position:absolute;left:0;right:0;top:calc(3.5rem + env(safe-area-inset-top));height:2px;overflow:hidden;background:color-mix(in oklch,var(--color-base-content,#ececee) 8%,transparent)}
    #boot .bb i{position:absolute;top:0;height:100%;width:38%;border-radius:2px;background:var(--color-primary,#ececee);animation:bootslide 1.1s cubic-bezier(.4,0,.2,1) infinite}
    #boot .bd{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + .75rem);width:12rem;height:3.25rem;border-radius:1.35rem;background:color-mix(in oklch,var(--color-base-100,#0a0a0b) 80%,transparent);border:1px solid color-mix(in oklch,var(--color-base-content,#ececee) 10%,transparent)}
    @keyframes bootslide{0%{left:-38%}100%{left:100%}}
    @media(prefers-reduced-motion:reduce){#boot .bb i{animation:none;left:0;width:100%;opacity:.5}}
  </style>
  <style>
    /* Realistic tone fields — dark nitrided-steel domes/dimples that catch a specular glint following a light
       whose direction (--lx/--ly, set on the pan by the gyroscope) shifts as you tilt the phone. Real DOM
       buttons (accessible, hit-testable); the 3D is pure light-reactive CSS. See RESEARCH-buttons.md. */
    /* Outer fields are CONCAVE dimples: a raised rim (bright toward the light, shadowed away) around a sunken
       dish, so the shading is INVERTED vs the convex ding — the rim glint sits toward the light, the dish
       shadow opposite. The specular is a ring on the rim, not a centre hotspot. */
    .hp-field{position:absolute;transform:translate(-50%,-50%);border-radius:50%;display:grid;place-items:center;
      border:0;padding:0;cursor:pointer;appearance:none;-webkit-tap-highlight-color:transparent;--glow:var(--color-secondary,#9F8CF6);
      background:radial-gradient(circle at calc(50% - var(--lx,0)*22%) calc(50% - var(--ly,0)*22%),#141519 0%,#1d1e23 52%,#2a2b32 84%,#303138 100%);
      box-shadow:
        calc(var(--lx,0)*-2px) calc(var(--ly,0)*-2px + 2px) 6px -1px rgba(0,0,0,.55),
        inset calc(var(--lx,0)*3px) calc(var(--ly,0)*3px) 5px rgba(0,0,0,.66),
        inset calc(var(--lx,0)*-2.4px) calc(var(--ly,0)*-2.4px) 2px rgba(255,255,255,.16),
        0 0 0 1px rgba(0,0,0,.4);
      transition:filter .2s ease;}
    .hp-field::after{content:"";position:absolute;inset:0;border-radius:50%;pointer-events:none;mix-blend-mode:screen;
      background:radial-gradient(circle at calc(50% - var(--lx,0)*34%) calc(50% - var(--ly,0)*34%),
        rgba(255,255,255,.34) 0%,rgba(255,255,255,.06) 13%,transparent 30%);}
    .hp-ding{background:radial-gradient(circle at 50% 40%,#34353c 0%,#212228 58%,#131418 100%);
      box-shadow:
        calc(var(--lx,0)*-4px) calc(var(--ly,0)*-4px + 5px) 15px -2px rgba(0,0,0,.72),
        inset calc(var(--lx,0)*2px) calc(var(--ly,0)*2px) 3px rgba(255,255,255,.2),
        inset calc(var(--lx,0)*-3px) calc(var(--ly,0)*-3px) 9px rgba(0,0,0,.5),
        0 0 0 1px rgba(0,0,0,.5);}
    .hp-ding::after{background:radial-gradient(circle at calc(50% + var(--lx,0)*26%) calc(40% + var(--ly,0)*24%),
        rgba(255,255,255,.55) 0%,rgba(255,255,255,.12) 16%,transparent 42%);}
    .hp-lbl{position:relative;z-index:1;pointer-events:none;font-weight:600;color:rgba(236,236,238,.82);
      font-size:clamp(.62rem,2.5vw,.95rem);text-shadow:0 1px 1px rgba(0,0,0,.55);}
    .hp-lit{animation:hp-press .22s cubic-bezier(.3,.7,.3,1);
      filter:drop-shadow(0 0 5px var(--glow)) drop-shadow(0 0 2px var(--glow)) brightness(1.14);}
    @keyframes hp-press{0%{transform:translate(-50%,-50%) scale(1)}34%{transform:translate(-50%,-50%) scale(.85)}100%{transform:translate(-50%,-50%) scale(1)}}
    @media(prefers-reduced-motion:reduce){.hp-lit{animation:none}}
  </style>
  <script type="importmap">
  {
    "imports": {
      "preact": "https://esm.sh/preact@10.27.1",
      "preact/hooks": "https://esm.sh/preact@10.27.1/hooks",
      "htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact",
      "nanostores": "https://esm.sh/nanostores@0.11.4",
      "@nanostores/persistent": "https://esm.sh/@nanostores/persistent@0.10.2?external=nanostores",
      "@nanostores/preact": "https://esm.sh/@nanostores/preact@0.5.2?external=preact,nanostores",
      "motion": "https://esm.sh/motion@11.18.2",
      "three": "https://esm.sh/three@0.171.0"
    }
  }
  </script>
</head>
<body class="bg-base-200 min-h-dvh">
  <div id="boot" aria-hidden="true"><div class="bh"><span class="bm">Хендпан</span></div><div class="bb"><i></i></div><div class="bd"></div></div>
  <div id="app"></div>
  <script type="module">
    import spec from "./spec.json" with { type: "json" };
    import en from "./i18n/en.json" with { type: "json" };
    import uk from "./i18n/uk.json" with { type: "json" };
    import * as views from "./view.js";
    import { start } from "/_rt/index.js";
    start({ ...spec, i18n: { en, uk } }, { views });
  </script>
</body>
</html>
